<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0d0d14" />
  <link rel="manifest" href="manifest.control.webmanifest" />
  <title>Landévennec — Médiateur</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/control.css" />
</head>
<body>

  <!-- En-tête statut ─────────────────────────────────────────────────────── -->
  <header id="status-bar">
    <div class="dot dot-off" id="status-dot"></div>
    <h1>Médiateur — Landévennec</h1>
    <span id="status-text">Connexion…</span>
    <span id="user-count" style="display:none"></span>
  </header>

  <main>

    <!-- Navigation ───────────────────────────────────────────────────────── -->
    <section id="section-nav">
      <h2>Points de vue</h2>
      <div id="pov-grid">
        <!-- généré par control.js -->
      </div>
    </section>

    <!-- Calques ──────────────────────────────────────────────────────────── -->
    <section id="section-layers">
      <h2>Calques</h2>
      <div id="layers-list">
        <!-- généré par control.js -->
      </div>
    </section>

    <!-- Navigation visiteurs ────────────────────────────────────────────── -->
    <section id="section-nav-ctrl">
      <h2>Navigation visiteurs</h2>
      <button id="btn-nav-toggle">🔒 Visite guidée — téléportation bloquée</button>
      <button id="btn-pov-transition">📍 Changements de vue VR — téléportation directe</button>
    </section>

    <!-- Calques visiteurs ───────────────────────────────────────────────── -->
    <section id="section-layers-ctrl">
      <h2>Calques visiteurs</h2>
      <button id="btn-layers-unlock">🔒 Exploration calques — désactivée</button>
    </section>

    <!-- Message ──────────────────────────────────────────────────────────── -->
    <section id="section-msg">
      <h2>Message aux visiteurs</h2>
      <div id="msg-row">
        <input id="msg-input" type="text" placeholder="Entrez un message…" autocomplete="off" />
        <button id="btn-send-msg">Envoyer</button>
      </div>
    </section>

    <!-- Lien visiteurs ───────────────────────────────────────────────────── -->
    <section id="section-link">
      <h2>Lien visiteurs</h2>
      <p>Partagez cette adresse avec les visiteurs :</p>
      <code id="visitor-url"></code>
    </section>

  </main>

  <div id="toast"></div>

  <script src="/vendors/vendors.min.js"></script>
  <script src="/dist/THREE.bundle.js"></script>
  <script src="/dist/ATON.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/control.js"></script>
  <script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
</body>
</html>
