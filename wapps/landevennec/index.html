<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="aton:appid" content="landevennec" />
  <title>Abbaye de Landévennec — Visite VR</title>
  <meta name="description" content="Visite virtuelle guidée de l'abbaye de Landévennec" />
  <link rel="manifest" href="app.webmanifest" />
  <link rel="icon" href="appicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="appicon.png" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/viewer.css" />
</head>
<body>

  <!-- Écran de chargement initial -->
  <div id="loading-screen">
    <div class="loader-ring"></div>
    <p class="loader-text">Chargement de la scène…</p>
  </div>

  <!-- Overlay UI — masqué automatiquement en mode XR immersif -->
  <div id="ui-overlay">

    <!-- Indicateur de session collaborative -->
    <div id="collab-indicator">
      <div class="collab-dot" id="collab-dot" style="display:none"></div>
      <span class="collab-text" id="collab-label"></span>
    </div>

    <!-- Panneau d'annotation (s'affiche au survol d'une zone sémantique) -->
    <div id="info-panel">
      <button id="info-panel-close" title="Fermer">✕</button>
      <h3 id="info-panel-title"></h3>
      <div id="info-panel-content"></div>
    </div>

    <!-- Panneau calques local (affiché uniquement si le médiateur l'autorise) -->
    <div id="local-layers-panel">
      <div class="local-layers-title">Calques</div>
      <div id="local-layers-list"></div>
    </div>

    <!-- Barre de contrôles -->
    <div id="controls-bar">
      <button class="ctrl-btn" id="btn-enter-vr" title="Entrer en mode VR immersif">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"/>
          <circle cx="8" cy="12" r="2"/><circle cx="16" cy="12" r="2"/>
        </svg>
        Entrer en VR
      </button>
      <button class="ctrl-btn" id="btn-home" title="Retourner au point de vue initial">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Accueil
      </button>
    </div>

  </div><!-- /#ui-overlay -->

  <!-- Toast de notification (commandes médiateur, messages) -->
  <div id="toast"></div>

  <!-- Loader interne ATON.FE (spinner pendant les chargements de nœuds) -->
  <div id="idLoader" style="display:none; position:fixed; bottom:16px; right:16px; z-index:200;">
    <img src="/res/loader.png" style="width:32px; opacity:0.7;" />
  </div>

  <script src="/vendors/vendors.min.js"></script>
  <script src="/dist/THREE.bundle.js"></script>
  <script src="/dist/ATON.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/network.js"></script>
  <script src="js/annotations.js"></script>
  <script src="js/xr.js"></script>
  <script src="js/help.js"></script>
  <script src="js/render-xray.js"></script>
  <script src="js/main.js"></script>
  <script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
</body>
</html>
